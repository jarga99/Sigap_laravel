name: Unified Sigap Deploy (Monolith)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies & Build Assets
        run: |
          npm install
          npm run build

      - name: Prepare Deployment Artifacts
        run: |
          # Create a clean deployment folder
          mkdir -p deploy_ready
          
          # Copy essential Laravel files
          cp -r app bootstrap config database public resources routes storage vendor .env.example artisan composer.json package.json vite.config.js deploy_ready/
          
          # Preparation for storage folders on cPanel
          mkdir -p deploy_ready/storage/framework/{sessions,views,cache}
          chmod -R 775 deploy_ready/storage deploy_ready/bootstrap/cache

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PROD_FTP_SERVER }}
          username: ${{ secrets.PROD_FTP_USERNAME }}
          password: ${{ secrets.PROD_FTP_PASSWORD }}
          local-dir: ./deploy_ready/
          server-dir: ${{ secrets.PROD_REMOTE_BACKEND_DIR }}/
          state-name: .ftp-deploy-sync-unified.json
          dangerously-clean-slot: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
