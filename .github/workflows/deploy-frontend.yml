name: Deploy Frontend to cPanel

on:
  push:
    branches: [ master ]
    paths:
      - 'frontend-client/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-client/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend-client
          npm install

      - name: Build Vue Project
        run: |
          cd frontend-client
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend-client/dist/
          server-dir: ${{ secrets.REMOTE_FRONTEND_DIR }}
          dangerously-clean-slot: true # Hapus file lama di server
