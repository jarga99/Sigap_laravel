name: Multi-Environment Deploy Backend

on:
  push:
    branches: [ master ]
    paths:
      - 'backend-api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Tentukan environment   berdasarkan trigger (Push = Staging, Manual = sesuai input)
    env:
      DEPLOY_TARGET: ${{ github.event_name == 'push' && 'staging' || github.event.inputs.target }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-api/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend-api
          npm install

      - name: Build Next.js (Standalone)
        run: |
          cd backend-api
          npm run build
        env:
          DATABASE_URL: ${{ env.DEPLOY_TARGET == 'production' && secrets.PROD_DATABASE_URL || secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ env.DEPLOY_TARGET == 'production' && secrets.PROD_JWT_SECRET || secrets.STAGING_JWT_SECRET }}

      - name: Prepare Standalone Artifacts
        run: |
          cd backend-api
          mkdir -p deploy_ready
          cp -r .next/standalone/. deploy_ready/
          mkdir -p deploy_ready/.next/static
          cp -r .next/static/. deploy_ready/.next/static/
          cp -r public/. deploy_ready/public/ || true

      - name: Create Restart Trigger File
        run: |
          mkdir -p backend-api/deploy_ready/tmp
          touch backend-api/deploy_ready/tmp/restart.txt

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.DEPLOY_TARGET == 'production' && secrets.PROD_FTP_SERVER || secrets.STAGING_FTP_SERVER }}
          username: ${{ env.DEPLOY_TARGET == 'production' && secrets.PROD_FTP_USERNAME || secrets.STAGING_FTP_USERNAME }}
          password: ${{ env.DEPLOY_TARGET == 'production' && secrets.PROD_FTP_PASSWORD || secrets.STAGING_FTP_PASSWORD }}
          local-dir: ./backend-api/deploy_ready/
          server-dir: ${{ env.DEPLOY_TARGET == 'production' && secrets.PROD_REMOTE_BACKEND_DIR || secrets.STAGING_REMOTE_BACKEND_DIR }}/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
