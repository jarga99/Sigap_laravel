name: SIGAP Monolith Deployment

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql, dom, curl, libxml, zip

      - name: 📦 Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: ⬢ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🏗️ Install NPM Dependencies & Build Assets
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build

      - name: ✅ Run PHP Syntax Check
        run: php -l app/Models/*.php app/Http/Controllers/*.php || echo "Syntax check failed but continuing..."

      - name: 📂 Prepare Deployment Artifacts
        run: |
          # Create a clean deployment folder
          mkdir -p deploy_ready
          
          # Copy essential Laravel files
          cp -r app bootstrap config database public resources routes storage vendor .env.example artisan composer.json package.json vite.config.js deploy_ready/
          
          # Preparation for storage and cache folders on cPanel
          mkdir -p deploy_ready/storage/framework/{sessions,views,cache}
          mkdir -p deploy_ready/storage/logs
          mkdir -p deploy_ready/bootstrap/cache
          
          # Ensure dummy files exist to force FTP folder creation
          touch deploy_ready/storage/framework/sessions/.gitkeep
          touch deploy_ready/storage/framework/views/.gitkeep
          touch deploy_ready/storage/framework/cache/.gitkeep
          touch deploy_ready/storage/logs/.gitkeep
          touch deploy_ready/bootstrap/cache/.gitkeep
          
          # Setup local permissions (best effort for FTP)
          chmod -R 775 deploy_ready/storage
          chmod -R 775 deploy_ready/bootstrap/cache

      - name: 🚀 Deploy to Server via FTP
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_ready/
          server-dir: ${{ secrets.FTP_REMOTE_DIR || './' }}
          state-name: .ftp-deploy-sync-monolith.json
          dangerous-clean-slate: true
          exclude: |
            .git/
            .git/**
            **/node_modules/**
            **/.env
            **/public/uploads/**
            **/storage/**
