name: SIGAP CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for change detection

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, curl, libxml, mysql, zip

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

    - name: Install NPM Dependencies & Build Assets
      run: |
        npm ci
        npm run build

    - name: Set Directory Permissions
      run: chmod -R 755 storage bootstrap/cache

    - name: Run PHP Syntax Check
      run: php -l app/Models/*.php app/Http/Controllers/*.php

    # ─────────────────────────────────────────────────────────────────────
    # DEPLOYMENT: Only uploads files that have changed since last deploy.
    # Server-specific configs (.env, .htaccess, storage/) are EXCLUDED
    # to prevent overwriting production configurations.
    # ─────────────────────────────────────────────────────────────────────
    - name: Deploy Changed Files to Server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /
        # Hanya upload file yang berubah (FTP-Deploy sudah tracking otomatis
        # via .ftp-deploy-sync-state.json yang disimpan di server)
        exclude: |
          **/.git/**
          **/.github/**
          **/node_modules/**
          **/.env
          **/.env.*
          **/sigap_backup_full_node/**
          **/backups/**
          **/storage/app/public/**
          **/storage/logs/**
          **/storage/framework/cache/**
          **/storage/framework/sessions/**
          **/storage/framework/views/**
          **/bootstrap/cache/**
          **/tests/**
          **/.htaccess
